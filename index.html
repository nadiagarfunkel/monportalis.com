<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Portalis</title>
  <link rel="preload" href="background.jpg" as="image">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="overlay"></div>

  <main>
    <div class="content">
      <img src="logo.svg" alt="Mon Portalis" class="logo">

      <p class="tagline">Where lawyers meet their work and clients meet their lawyer</p>

      <form class="email-form">
        <input
          type="email"
          name="email"
          placeholder="Enter your email"
          required
          aria-label="Email address"
        >
        <input type="text" name="website" style="display:none" tabindex="-1" autocomplete="off">
        <button type="submit">Join waitlist</button>
      </form>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
